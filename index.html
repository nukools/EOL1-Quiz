<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#d42027">
<title>EOL Line 1 · Workshop Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17191c; --ink2:#3b4149; --paper:#ffffff; --panel:#f6f5f2;
    --red:#d42027; --red-dk:#a5161c; --line:#dcd9d2; --line2:#c7c3ba;
    --amber:#9a5b00; --amber-bg:#fdf4e3; --green:#1e7a46; --green-bg:#eaf4ee;
    --blue:#1b4f72; --mute:#7b7f86;
    --disp:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter","Noto Sans Thai",system-ui,sans-serif;
    --th:"Noto Sans Thai","Inter",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--body); color:var(--ink); background:var(--panel);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:640px; margin:0 auto; padding:0 16px 120px}
  a{color:var(--red)}

  /* ---------- top brand bar ---------- */
  .brand{
    display:flex; align-items:center; gap:10px;
    max-width:640px; margin:0 auto; padding:14px 16px 10px;
  }
  .brand img{height:24px; width:auto; display:block}
  .brand .ids{font:600 11px/1.35 var(--mono); color:var(--ink2); letter-spacing:.02em}
  .brand .ids b{color:var(--ink)}
  .brand .spacer{flex:1}
  .brand .prog{font:600 10px/1.3 var(--mono); color:var(--red); text-align:right; letter-spacing:.04em}

  /* ---------- ticket header ---------- */
  .ticket{
    position:relative; background:var(--paper); border:1px solid var(--line);
    border-radius:14px; overflow:hidden; margin-top:6px;
    box-shadow:0 1px 0 rgba(0,0,0,.03), 0 10px 26px -18px rgba(0,0,0,.28);
  }
  .ticket .band{height:5px; background:var(--red)}
  .ticket .row{display:flex; align-items:stretch}
  .ticket .stub{
    flex:0 0 74px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; padding:14px 6px; background:var(--panel); position:relative;
  }
  .ticket .stub::after{
    content:""; position:absolute; top:8px; bottom:8px; right:0;
    border-right:2px dashed var(--line2);
  }
  .ticket .stub .g{font:600 9px/1 var(--mono); color:var(--mute); letter-spacing:.14em}
  .ticket .stub .code{font:700 20px/1 var(--disp); color:var(--red)}
  .ticket .meta{flex:1; padding:14px 16px 15px}
  .ticket .kick{font:600 10px/1.3 var(--mono); letter-spacing:.09em; text-transform:uppercase; color:var(--red)}
  .ticket h1{font:700 20px/1.18 var(--disp); margin:3px 0 0; letter-spacing:-.01em}
  .ticket .sub{font-size:12.5px; color:var(--ink2); margin-top:5px}
  .ticket .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
  .chip{font:600 10.5px/1 var(--mono); color:var(--ink2); background:var(--panel);
    border:1px solid var(--line); border-radius:999px; padding:5px 9px}
  .chip.red{color:var(--red-dk); border-color:#eab6b8; background:#fdf0f0}

  /* ---------- name gate ---------- */
  .namecard{
    background:var(--paper); border:1px solid var(--line); border-radius:12px;
    padding:13px 14px; margin-top:12px;
  }
  .namecard label{font:600 11px/1.3 var(--mono); color:var(--ink2); letter-spacing:.04em; display:block; margin-bottom:6px}
  .namecard input{
    width:100%; font-family:var(--body); font-size:16px; color:var(--ink);
    border:1px solid var(--line2); border-radius:9px; padding:11px 12px; background:#fff;
  }
  .namecard input:focus{outline:none; border-color:var(--red); box-shadow:0 0 0 3px #fdecec}
  .namecard .hint{font-size:11.5px; color:var(--mute); margin-top:7px}

  /* ---------- questions ---------- */
  .qlist{margin-top:16px; display:flex; flex-direction:column; gap:14px}
  .q{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px 15px 13px}
  .q .qtop{display:flex; align-items:baseline; gap:9px}
  .q .qid{font:600 10.5px/1.4 var(--mono); color:#fff; background:var(--ink); border-radius:6px; padding:3px 7px; white-space:nowrap}
  .q .qtag{font:600 9.5px/1.4 var(--mono); color:var(--mute); letter-spacing:.06em; text-transform:uppercase}
  .q .stem{font-size:15px; font-weight:600; color:var(--ink); margin:9px 0 2px}
  .q .th{font-family:var(--th); font-size:13px; color:var(--ink2); margin-top:3px}
  .opts{margin-top:11px; display:flex; flex-direction:column; gap:8px}
  .opt{
    display:flex; gap:10px; align-items:flex-start; cursor:pointer;
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:#fff;
    transition:border-color .12s, background .12s;
  }
  .opt:hover{border-color:var(--line2)}
  .opt input{position:absolute; opacity:0; width:0; height:0}
  .opt .key{
    flex:0 0 22px; height:22px; border:1.5px solid var(--line2); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font:700 12px/1 var(--mono); color:var(--ink2); background:var(--panel);
  }
  .opt .txt{font-size:14px; color:var(--ink); padding-top:1px}
  .opt.sel{border-color:var(--red); background:#fdf4f4}
  .opt.sel .key{background:var(--red); border-color:var(--red); color:#fff}
  textarea.free{
    width:100%; font-family:var(--body); font-size:15px; color:var(--ink); margin-top:11px;
    border:1px solid var(--line2); border-radius:10px; padding:11px 12px; min-height:88px; resize:vertical; background:#fff;
  }
  textarea.free:focus{outline:none; border-color:var(--red); box-shadow:0 0 0 3px #fdecec}
  .q.anchor{border-color:#eab6b8; box-shadow:0 0 0 3px #fdf0f0 inset}
  .q .anchornote{font:600 10px/1.4 var(--mono); color:var(--red-dk); margin-top:8px; letter-spacing:.03em}

  /* ---------- sticky action bar ---------- */
  .bar{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    background:rgba(255,255,255,.92); backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  }
  .bar .inner{max-width:640px; margin:0 auto; display:flex; align-items:center; gap:12px}
  .bar .prog{flex:1; font:600 11.5px/1.3 var(--mono); color:var(--ink2)}
  .bar .prog b{color:var(--red)}
  .btn{
    font-family:var(--disp); font-weight:700; font-size:15px; border:none; border-radius:10px;
    padding:12px 18px; cursor:pointer; letter-spacing:.01em;
  }
  .btn.primary{background:var(--red); color:#fff}
  .btn.primary:disabled{background:#e6b9bb; cursor:not-allowed}
  .btn.primary:not(:disabled):active{background:var(--red-dk)}
  .btn.ghost{background:var(--paper); color:var(--ink); border:1px solid var(--line2)}
  .btn.block{width:100%; text-align:center; padding:14px}

  /* ---------- index (landing) ---------- */
  .lead{margin-top:14px}
  .lead .k{font:600 11px/1.3 var(--mono); letter-spacing:.09em; text-transform:uppercase; color:var(--red)}
  .lead h1{font:700 26px/1.12 var(--disp); margin:6px 0 0; letter-spacing:-.01em}
  .lead p{font-size:14px; color:var(--ink2); margin:8px 0 0}
  .grid{margin-top:16px; display:flex; flex-direction:column; gap:10px}
  .card{
    display:flex; align-items:center; gap:13px; text-decoration:none; color:inherit;
    background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:13px 14px;
    transition:border-color .12s, transform .06s;
  }
  .card:active{transform:scale(.995)}
  .card:hover{border-color:var(--line2)}
  .card .code{
    flex:0 0 46px; height:46px; border-radius:10px; background:var(--panel); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font:700 15px/1 var(--disp); color:var(--red);
  }
  .card.pre .code, .card.post .code{font-size:12px}
  .card .cbody{flex:1; min-width:0}
  .card .ct{font:600 15px/1.25 var(--disp)}
  .card .cs{font-size:12px; color:var(--mute); margin-top:2px}
  .card .go{font:600 18px/1 var(--mono); color:var(--line2)}
  .idxnote{
    margin-top:16px; background:var(--amber-bg); border:1px solid #efdcb4; border-radius:11px;
    padding:12px 14px; font-size:12.5px; color:#6b4e12;
  }
  .idxnote b{color:var(--amber)}

  /* ---------- summary ---------- */
  .done{margin-top:8px}
  .done .stamp{
    background:var(--green-bg); border:1px solid #bfe0cd; border-radius:12px;
    padding:14px 16px; display:flex; align-items:center; gap:13px;
  }
  .done .stamp .tick{
    flex:0 0 38px; height:38px; border-radius:50%; background:var(--green); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700;
  }
  .done .stamp .t1{font:700 15px/1.2 var(--disp); color:#155c34}
  .done .stamp .t2{font-size:12px; color:#2f7a4f; margin-top:2px}
  .receipt{
    background:var(--paper); border:1px solid var(--line); border-radius:12px; margin-top:14px; overflow:hidden;
  }
  .receipt .rhead{padding:14px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px}
  .receipt .rhead img{height:26px}
  .receipt .rhead .rt{font:700 14px/1.2 var(--disp)}
  .receipt .rhead .rs{font:500 10.5px/1.3 var(--mono); color:var(--mute); margin-top:2px}
  .receipt .rmeta{display:flex; flex-wrap:wrap; gap:6px 22px; padding:12px 16px; border-bottom:1px solid var(--line); font:500 12px/1.4 var(--mono); color:var(--ink2)}
  .receipt .rmeta b{color:var(--ink)}
  .score{padding:12px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px}
  .score .big{font:700 22px/1 var(--disp); color:var(--red)}
  .score .lbl{font-size:12px; color:var(--ink2)}
  .score .note{font-size:11px; color:var(--mute); margin-top:2px}
  .ans{padding:6px 16px 12px}
  .ans .a{padding:9px 0; border-bottom:1px dashed var(--line)}
  .ans .a:last-child{border-bottom:none}
  .ans .aid{font:600 10.5px/1.4 var(--mono); color:var(--ink); background:var(--panel); border:1px solid var(--line); border-radius:5px; padding:2px 6px; margin-right:8px}
  .ans .aq{font-size:12.5px; color:var(--ink2)}
  .ans .av{font:600 13px/1.4 var(--mono); color:var(--ink); margin-top:5px}
  .ans .av.empty{color:#c0392b; font-weight:500}
  .steps{margin-top:16px; background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:6px 16px}
  .steps h3{font:700 13px/1.3 var(--disp); margin:12px 0 8px}
  .steps ol{margin:0 0 12px; padding-left:20px}
  .steps li{font-size:13px; color:var(--ink2); margin:7px 0}
  .steps li b{color:var(--ink)}
  .actions{margin-top:14px; display:flex; flex-direction:column; gap:10px}

  .foot{max-width:640px; margin:22px auto 0; padding:14px 16px; text-align:center;
    font:500 10.5px/1.5 var(--mono); color:var(--mute); border-top:1px solid var(--line)}

  .hidden{display:none !important}

  /* ---------- print / PDF ---------- */

  @media print{
    @page{margin:14mm}
    body{background:#fff}
    .brand,.bar,.steps,.actions,.foot,.done .stamp,.q.printhide{display:none !important}
    .wrap{max-width:none; padding:0}
    .receipt{border:none; margin:0}
    .receipt .rhead{border-color:#000}
    .ans .a{break-inside:avoid}
    .score .big{color:#000}
    a[href]:after{content:""}
  }
  @media (max-width:400px){
    .ticket .stub{flex-basis:62px}
    .ticket h1{font-size:18px}
    .lead h1{font-size:23px}
  }
</style>
</head>

/* ================= STATE ================= */
let state = { quiz:null, name:"", answers:{}, submittedAt:null };

/* ================= HELPERS ================= */
const $app = document.getElementById('app');
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const meta = id => QUIZZES.find(q=>q.id===id);
function fmtTime(d){
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

/* ================= ROUTER ================= */
function route(){
  const h = (location.hash||'').replace(/^#\/?/,'').toLowerCase();
  if(BANK[h]){ startQuiz(h); }
  else { renderIndex(); }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);

/* ================= INDEX ================= */
function renderIndex(){
  state.quiz=null;
  const cards = QUIZZES.map(q=>{
    const cls = q.id==='pre'?'pre':q.id==='post'?'post':'';
    return `<a class="card ${cls}" href="#${q.id}">
      <div class="code">${esc(q.code)}</div>
      <div class="cbody"><div class="ct">${esc(q.title)}</div><div class="cs">${esc(q.kick)} · ${esc(q.chips[0])}</div></div>
      <div class="go">\u203a</div>
    </a>`;
  }).join('');
  $app.innerHTML = `
    <div class="lead">
      <div class="k">EOL Line 1 · Learn by Fixing</div>
      <h1>Workshop quizzes</h1>
      <p>Pick the quiz your instructor names for each module. Each module quiz is your ticket into that lab.</p>
    </div>
    <div class="grid">${cards}</div>
    <div class="idxnote"><b>On your laptop:</b> answer the items, tap <b>Finish</b>, then <b>Save as PDF</b> or <b>Copy my answers as text</b> and send it to the instructor. You don't see the correct answers here — we go through every answer together in the debrief.</div>
    <div class="foot">AUTO INNOVATE CONSTRUCTION CO., LTD. &nbsp;·&nbsp; AIC-TRN-EOL1-QZ &nbsp;·&nbsp; Rev 0.1</div>`;
}

/* ================= QUIZ ================= */
function startQuiz(id){
  if(state.quiz!==id){ state.quiz=id; state.answers={}; state.submittedAt=null; }
  renderQuiz();
}
function renderQuiz(){
  const q = meta(state.quiz), items = BANK[state.quiz];
  const chips = q.chips.map((c,i)=>`<span class="chip${i>0&&/Ticket/.test(c)?' red':''}">${esc(c)}</span>`).join('');
  const qs = items.map((it,i)=>renderItem(it,i)).join('');
  $app.innerHTML = `
    <div class="ticket">
      <div class="band"></div>
      <div class="row">
        <div class="stub"><span class="g">GATE</span><span class="code">${esc(q.code)}</span></div>
        <div class="meta">
          <div class="kick">${esc(q.kick)}</div>
          <h1>${esc(q.title)}</h1>
          <div class="sub">${esc(q.sub)}</div>
          <div class="chips">${chips}</div>
        </div>
      </div>
    </div>

    <div class="namecard">
      <label for="nm">YOUR NAME · ชื่อผู้ทำแบบทดสอบ</label>
      <input id="nm" type="text" autocomplete="name" placeholder="e.g. Somchai P. — Line 1 maintenance" value="${esc(state.name)}">
      <div class="hint">Required — it prints on your answer sheet so the instructor knows whose it is.</div>
    </div>

    <div class="qlist">${qs}</div>

    <div style="margin-top:8px"><a href="#" style="font:600 12px/1 var(--mono); color:var(--mute); text-decoration:none">\u2039 back to all quizzes</a></div>
    <div class="foot">AUTO INNOVATE CONSTRUCTION CO., LTD. &nbsp;·&nbsp; ${esc(q.title)}</div>`;

  // action bar
  let bar = document.getElementById('bar');
  if(!bar){ bar=document.createElement('div'); bar.id='bar'; bar.className='bar'; document.body.appendChild(bar); }
  bar.innerHTML = `<div class="inner"><div class="prog" id="prog"></div><button class="btn primary" id="finish">Finish &amp; review</button></div>`;

  document.getElementById('nm').addEventListener('input', e=>{ state.name=e.target.value; refreshBar(); });
  document.getElementById('finish').addEventListener('click', onFinish);
  refreshBar();
}
function renderItem(it,i){
  const head = `<div class="qtop"><span class="qid">${esc(it.id)}</span><span class="qtag">${esc(it.tag)}</span></div>
    <div class="stem">${esc(it.en)}</div><div class="th">${esc(it.th)}</div>`;
  if(it.type==='open'){
    const anchor = it.anchor ? `<div class="anchornote">\u2605 Anchor question — answer in your own words. Graded together in the debrief.</div>` : '';
    return `<div class="q${it.anchor?' anchor':''}" data-id="${it.id}">${head}
      <textarea class="free" data-id="${it.id}" placeholder="Type your answer\u2026 / พิมพ์คำตอบ">${esc(state.answers[it.id]||'')}</textarea>${anchor}</div>`;
  }
  const opts = it.opts.map(([k,t])=>{
    const sel = state.answers[it.id]===k ? ' sel':'';
    return `<label class="opt${sel}" data-id="${it.id}" data-k="${k}">
      <input type="radio" name="${it.id}" value="${k}"${sel?' checked':''}>
      <span class="key">${k}</span><span class="txt">${esc(t)}</span></label>`;
  }).join('');
  return `<div class="q" data-id="${it.id}">${head}<div class="opts">${opts}</div></div>`;
}
/* delegated inputs */
$app.addEventListener('click', e=>{
  const opt = e.target.closest('.opt'); if(!opt) return;
  const id=opt.dataset.id, k=opt.dataset.k;
  state.answers[id]=k;
  opt.parentNode.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel', o===opt));
  opt.querySelector('input').checked=true;
  refreshBar();
});
$app.addEventListener('input', e=>{
  const ta=e.target.closest('textarea.free'); if(!ta) return;
  state.answers[ta.dataset.id]=ta.value; refreshBar();
});
function answeredCount(){
  const items=BANK[state.quiz]; let n=0;
  items.forEach(it=>{ const a=state.answers[it.id]; if(a!==undefined && String(a).trim()!=='') n++; });
  return n;
}
function refreshBar(){
  const items=BANK[state.quiz], done=answeredCount(), total=items.length;
  const prog=document.getElementById('prog'); if(prog) prog.innerHTML=`Answered <b>${done}</b> / ${total}`;
  const fin=document.getElementById('finish'); if(fin) fin.disabled = !(state.name.trim().length>0);
}

/* ================= FINISH / SUMMARY ================= */
function onFinish(){
  if(!state.name.trim()){ document.getElementById('nm').focus(); return; }
  const items=BANK[state.quiz], missing=items.filter(it=>{const a=state.answers[it.id]; return a===undefined||String(a).trim()===''; });
  if(missing.length){
    if(!confirm(`${missing.length} item(s) not answered yet. Finish anyway?\n\nยังไม่ได้ตอบ ${missing.length} ข้อ — จะไปหน้าสรุปเลยไหม?`)) return;
  }
  state.submittedAt = new Date();
  renderSummary();
}
function autoScore(){
  const items=BANK[state.quiz]; let correct=0, total=0;
  items.forEach(it=>{ if(it.type==='mcq'){ total++; if(state.answers[it.id]===it.correct) correct++; } });
  return {correct,total};
}
function renderSummary(){
  const q=meta(state.quiz), items=BANK[state.quiz], sc=autoScore();
  const when=fmtTime(state.submittedAt);
  const rows = items.map(it=>{
    const a=state.answers[it.id];
    let val;
    if(a===undefined||String(a).trim()===''){ val=`<div class="av empty">\u2014 not answered</div>`; }
    else if(it.type==='open'){ val=`<div class="av">${esc(a)}</div>`; }
    else { const opt=it.opts.find(o=>o[0]===a); val=`<div class="av">${esc(a)}) ${esc(opt?opt[1]:'')}</div>`; }
    return `<div class="a"><span class="aid">${esc(it.id)}</span><span class="aq">${esc(it.en)}</span>${val}</div>`;
  }).join('');

  const scoreBlock = SHOW_AUTOSCORE ? `<div class="score">
      <div class="big">${sc.correct}/${sc.total}</div>
      <div><div class="lbl">auto-scored multiple-choice</div>
      <div class="note">Short/open items are graded with the instructor. This is not your final mark.</div></div>
    </div>` : '';

    <div class="done">
      <div class="stamp"><div class="tick">\u2713</div>

      if(typeof window.print!=='function'){ throw new Error('no print'); }

      setTimeout(()=>{
        window.removeEventListener('beforeprint',mark);

function resultText(){
  const q=meta(state.quiz), when=fmtTime(state.submittedAt||new Date());
  const rows=BANK[state.quiz].map((it,i)=>{
    const a=state.answers[i];
    return '  '+String(i+1)+'. '+it[0]+'  ->  '+(a?a:'-');
  }).join('\n');
  return 'EOL Line 1 workshop \u2014 answer sheet\n'
    +'Name: '+state.name+'\n'
    +'Quiz: '+q.title+' ('+q.code+')\n'
    +'Submitted: '+when+'\n'
    +'Answered: '+answeredCount()+'/'+BANK[state.quiz].length+'\n\n'
    +rows+'\n';
}

function copyResult(){
  const txt=resultText(), btn=document.getElementById('copy');
  const ok=function(){ if(btn){ const o=btn.textContent; btn.textContent='Copied \u2014 now paste it into e-mail or LINE'; setTimeout(function(){btn.textContent=o;},3500);} };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(txt).then(ok, function(){ legacyCopy(txt,ok); });
  } else { legacyCopy(txt,ok); }
}

function legacyCopy(txt,ok){
  const ta=document.createElement('textarea');
  ta.value=txt; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.top='-1000px';
  document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,txt.length);
  let done=false; try{ done=document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  if(done){ ok(); } else { showTextBox(txt); }
}

function showTextBox(txt){
  const host=document.querySelector('.actions'); if(!host) return;
  if(document.getElementById('rawbox')) return;
  const d=document.createElement('div'); d.id='rawbox';
  d.style.cssText='margin-top:14px;padding:12px;border:1px solid #d8d5ce;border-radius:8px;background:#faf9f7';
  d.innerHTML='<div style="font:600 13px/1.4 system-ui;margin-bottom:8px">Select all of the text below, copy it, and paste it into an e-mail or a LINE message.</div>';
  const ta=document.createElement('textarea');
  ta.readOnly=true; ta.value=txt;
  ta.style.cssText='width:100%;height:190px;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;border:1px solid #d8d5ce;border-radius:6px;padding:8px;background:#fff';
  d.appendChild(ta); host.appendChild(d);
  ta.focus(); ta.select();
}

function showPrintFallback(){
  const host=document.querySelector('.actions'); if(!host) return;
  if(document.getElementById('pfb')) return;
  const d=document.createElement('div'); d.id='pfb';
  d.style.cssText='margin-top:12px;padding:12px 14px;border:1px solid #efdcb4;background:#fdf4e3;border-radius:8px;font:14px/1.55 system-ui;color:#3b4149';
  d.innerHTML='<b>This browser cannot print.</b> That normally means the page was opened inside another application, such as LINE or Facebook.<br><br>Either open this page in Chrome or Safari and try again, or use <b>Copy my answers as text</b> above and paste the result into an e-mail.';
  host.appendChild(d);
  showTextBox(resultText());
}

function sendMail(){
  const q=meta(state.quiz), when=fmtTime(state.submittedAt||new Date());
  const subject=`[EOL1 Quiz] ${q.code} — ${state.name}`;
  const body =
`Instructor,

Attached is my answer sheet for the EOL Line 1 workshop.

  Name: ${state.name}
  Quiz: ${q.title} (${q.code})
  Submitted: ${when}
  Answered: ${answeredCount()}/${BANK[state.quiz].length}

(Please remember to attach the PDF you saved.)`;
  location.href = `mailto:${INSTRUCTOR_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
